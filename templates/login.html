<!DOCTYPE html>
<html>
<head>
    <title>Exercise Tracker - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #1a1a2e; color: #e0e0e0; display: flex; justify-content: center;
               align-items: center; min-height: 100vh; }
        .login-box { background: #16213e; padding: 2rem; border-radius: 12px;
                     box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 320px; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #00d4ff; font-size: 1.4rem; }
        input[type="password"] { width: 100%; padding: 12px; border: 1px solid #333;
            border-radius: 8px; background: #0f3460; color: #fff; font-size: 1rem;
            margin-bottom: 1rem; }
        button { width: 100%; padding: 12px; background: #00d4ff; color: #1a1a2e;
                 border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
                 cursor: pointer; }
        button:hover { background: #00b8d9; }
        .flash { color: #ff6b6b; text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🏋️ Exercise Tracker</h1>
        {% for msg in get_flashed_messages() %}
        <p class="flash">{{ msg }}</p>
        {% endfor %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autocomplete="current-password" autofocus>
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
