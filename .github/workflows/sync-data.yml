name: Sync exercise data

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Export data from Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python export_data.py data/data_export.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data_export.txt data/notes_export.txt
          git diff --staged --quiet || git commit -m "Sync exercise data $(date -u +%Y-%m-%d)"
          git push
